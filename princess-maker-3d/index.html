<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffd9ec">
<title>きらきらプリンセス 〜おしろのまいにち〜</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👸</text></svg>">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#ffd9ec; position:fixed; touch-action:none; }
  #renderCanvas { width:100%; height:100%; display:block; outline:none; touch-action:none; }

  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  .ui { position:absolute; z-index:10; font-family:"Hiragino Maru Gothic ProN","Rounded Mplus 1c","M PLUS Rounded 1c","Yu Gothic",sans-serif; }

  /* ---------- HUD ---------- */
  #hud {
    top:calc(var(--safe-top) + 8px); left:calc(var(--safe-left) + 8px); right:calc(var(--safe-right) + 8px);
    display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none;
  }
  .badge {
    display:flex; align-items:center; gap:6px;
    background:rgba(255,255,255,.82); border-radius:999px; padding:8px 16px;
    font-size:20px; font-weight:800; color:#b0447c; white-space:nowrap;
    box-shadow:0 3px 10px rgba(180,80,140,.25), inset 0 0 0 3px #ffc7e2;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  .badge .num { font-size:22px; color:#7a2f58; min-width:1.2em; text-align:left; }
  #hudRight { display:flex; gap:8px; }
  #levelBadge { font-size:18px; }
  #levelBadge .num { color:#c98600; }
  .badge.bump { animation:bump .45s ease; }
  @keyframes bump { 30% { transform:scale(1.25); } 100% { transform:scale(1); } }

  /* ---------- Bottom activity bar ---------- */
  #actionBar {
    bottom:calc(var(--safe-bottom) + 10px); left:50%; transform:translateX(-50%);
    display:flex; gap:10px; padding:10px 14px;
    background:rgba(255,255,255,.75); border-radius:32px;
    box-shadow:0 6px 20px rgba(180,80,140,.3), inset 0 0 0 3px #ffc7e2;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    max-width:calc(100vw - 20px);
  }
  .actBtn {
    width:62px; height:62px; border-radius:50%;
    border:none; font-size:32px; line-height:1;
    background:linear-gradient(180deg,#fff6fb,#ffd9ec);
    box-shadow:0 4px 0 #e8a5c8, 0 6px 12px rgba(180,80,140,.25);
    cursor:pointer; transition:transform .12s ease, box-shadow .12s ease;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .actBtn:active { transform:translateY(3px) scale(.94); box-shadow:0 1px 0 #e8a5c8; }
  .actBtn.busy { filter:grayscale(.6) opacity(.55); pointer-events:none; }
  .actBtn .lbl {
    position:absolute; bottom:-4px; left:50%; transform:translateX(-50%);
    font-size:9px; font-weight:800; color:#b0447c; white-space:nowrap;
    background:rgba(255,255,255,.9); padding:1px 6px; border-radius:8px;
  }
  @media (max-width:430px) {
    .actBtn { width:52px; height:52px; font-size:26px; }
    #actionBar { gap:7px; padding:8px 10px; }
  }

  /* ---------- Wardrobe panel ---------- */
  #wardrobe {
    display:none; flex-direction:column; gap:10px;
    bottom:calc(var(--safe-bottom) + 92px); left:50%; transform:translateX(-50%);
    width:min(480px, calc(100vw - 24px));
    max-height:calc(100vh - 220px);
    background:rgba(255,252,255,.94); border-radius:26px; padding:16px;
    box-shadow:0 10px 34px rgba(150,60,120,.4), inset 0 0 0 4px #ffc7e2;
    overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y;
  }
  #wardrobe.open { display:flex; }
  .wRow { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .wTitle { font-size:20px; width:100%; font-weight:800; color:#b0447c; }
  .swatch {
    width:52px; height:52px; border-radius:16px; border:3px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,.18); cursor:pointer; font-size:26px;
    display:flex; align-items:center; justify-content:center; position:relative;
    transition:transform .12s ease;
  }
  .swatch:active { transform:scale(.9); }
  .swatch.sel { border-color:#ffb300; box-shadow:0 0 0 3px #ffe082, 0 2px 6px rgba(0,0,0,.2); }
  .swatch.locked { filter:grayscale(1) opacity(.5); }
  .swatch.locked::after {
    content:"🔒"; position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; font-size:22px; background:rgba(255,255,255,.35); border-radius:12px;
  }
  .swatch .lv {
    position:absolute; bottom:-6px; right:-6px; background:#ffb300; color:#fff;
    font-size:11px; font-weight:800; border-radius:999px; padding:2px 6px; z-index:2;
  }

  /* ---------- Title screen ---------- */
  #titleScreen {
    inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 50% 30%, #ffeaf5 0%, #ffd0e8 45%, #e6b7ff 100%);
    z-index:50; transition:opacity .8s ease; gap:4vh; text-align:center; padding:20px;
  }
  #titleScreen.hidden { opacity:0; pointer-events:none; }
  #titleCrown { font-size:min(17vw, 96px); animation:floaty 3s ease-in-out infinite; filter:drop-shadow(0 8px 12px rgba(180,80,140,.35)); }
  @keyframes floaty { 50% { transform:translateY(-14px) rotate(-4deg); } }
  #titleText {
    font-size:min(9vw, 52px); font-weight:900; color:#c2508c; line-height:1.35;
    text-shadow:0 3px 0 #fff, 0 8px 18px rgba(190,90,150,.35);
  }
  #titleText small { display:block; font-size:.48em; color:#9a63c9; }
  #startBtn {
    border:none; font-size:min(8vw, 44px); font-weight:900; color:#fff;
    padding:.55em 1.4em; border-radius:999px; cursor:pointer;
    background:linear-gradient(180deg,#ff9ecb,#f0569b);
    box-shadow:0 7px 0 #c23a78, 0 14px 30px rgba(190,60,120,.45);
    animation:pulse 1.6s ease-in-out infinite;
    font-family:inherit;
  }
  #startBtn:active { transform:translateY(5px); box-shadow:0 2px 0 #c23a78; }
  @keyframes pulse { 50% { transform:scale(1.06); } }
  #titleHint { font-size:16px; color:#a06090; font-weight:700; }
  #loadingNote { font-size:14px; color:#b58; }

  /* ---------- Celebration overlay ---------- */
  #celebrate {
    inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    z-index:40; pointer-events:none; gap:2vh; text-align:center;
  }
  #celebrate.show { display:flex; }
  #celebGift { font-size:min(30vw,150px); animation:giftIn .9s cubic-bezier(.2,1.6,.4,1) both; filter:drop-shadow(0 10px 20px rgba(120,40,90,.4)); }
  @keyframes giftIn { from { transform:scale(0) rotate(-40deg); } }
  #celebText {
    font-size:min(9vw,54px); font-weight:900; color:#fff;
    text-shadow:0 3px 0 #e0559c, 0 8px 24px rgba(140,30,90,.6);
    animation:giftIn 1.1s .15s cubic-bezier(.2,1.6,.4,1) both;
  }
  #celebSub { font-size:min(5.5vw,30px); font-weight:800; color:#fff; text-shadow:0 2px 0 #b077d8, 0 6px 16px rgba(90,40,140,.6); animation:giftIn 1.2s .3s both; }

  /* flying reward icons */
  .flyIcon { position:absolute; z-index:30; font-size:30px; pointer-events:none; will-change:transform, opacity;
    transition:transform 1s cubic-bezier(.4,-0.2,.6,1), opacity 1s ease; filter:drop-shadow(0 2px 4px rgba(0,0,0,.25)); }

  /* speech bubble above princess */
  #bubble {
    display:none; padding:10px 18px; background:rgba(255,255,255,.95); border-radius:20px;
    font-size:26px; box-shadow:0 4px 12px rgba(160,60,120,.3), inset 0 0 0 3px #ffd9ec;
    transform:translate(-50%,-120%); white-space:nowrap; pointer-events:none; z-index:20;
  }
  #bubble.show { display:block; animation:bubbleIn .35s cubic-bezier(.2,1.6,.4,1) both; }
  @keyframes bubbleIn { from { transform:translate(-50%,-120%) scale(0); } }

  /* sound toggle */
  #soundBtn {
    width:46px; height:46px; border-radius:50%; border:none; font-size:22px;
    background:rgba(255,255,255,.82); box-shadow:0 3px 10px rgba(180,80,140,.25), inset 0 0 0 3px #ffc7e2;
    cursor:pointer; pointer-events:auto;
  }
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>

<div class="ui" id="hud">
  <div style="display:flex; gap:8px; align-items:center;">
    <div class="badge" id="levelBadge">👑 レベル <span class="num" id="levelNum">1</span></div>
    <button id="soundBtn" aria-label="おと">🔊</button>
  </div>
  <div id="hudRight">
    <div class="badge" id="starBadge">⭐ <span class="num" id="starNum">0</span></div>
    <div class="badge" id="heartBadge">💗 <span class="num" id="heartNum">0</span></div>
  </div>
</div>

<div class="ui" id="actionBar">
  <button class="actBtn" data-act="tea">🍰<span class="lbl">おちゃかい</span></button>
  <button class="actBtn" data-act="dance">💃<span class="lbl">ダンス</span></button>
  <button class="actBtn" data-act="art">🎨<span class="lbl">おえかき</span></button>
  <button class="actBtn" data-act="magic">🪄<span class="lbl">まほう</span></button>
  <button class="actBtn" data-act="pony">🐴<span class="lbl">ポニー</span></button>
  <button class="actBtn" data-act="garden">🌷<span class="lbl">おはな</span></button>
  <button class="actBtn" id="wardrobeBtn">👗<span class="lbl">おきがえ</span></button>
</div>

<div class="ui" id="wardrobe">
  <div class="wRow"><span class="wTitle">👗 ドレス</span><span id="dressRow" style="display:contents"></span></div>
  <div class="wRow"><span class="wTitle">💇 かみがた</span><span id="hairRow" style="display:contents"></span></div>
  <div class="wRow"><span class="wTitle">🎀 かみのいろ</span><span id="hairColorRow" style="display:contents"></span></div>
  <div class="wRow"><span class="wTitle">👑 あたまのかざり</span><span id="crownRow" style="display:contents"></span></div>
</div>

<div class="ui" id="bubble"></div>

<div class="ui" id="celebrate">
  <div id="celebGift">🎁</div>
  <div id="celebText"></div>
  <div id="celebSub"></div>
</div>

<div class="ui" id="titleScreen">
  <div id="titleCrown">👸✨</div>
  <div id="titleText">きらきらプリンセス<small>〜 おしろの まいにち 〜</small></div>
  <button id="startBtn">▶ はじめる</button>
  <div id="titleHint">🍰 あそぶ ・ 💃 おどる ・ 👗 おきがえ<br>すきなボタンを タッチしてね!</div>
  <div id="loadingNote">よみこみちゅう…</div>
</div>

<script src="vendor/babylon.min.js"></script>
<script>
  if (typeof BABYLON === "undefined") {
    document.write('<script src="https://cdn.babylonjs.com/babylon.js"><\/script>');
  }
</script>
<script src="js/save.js"></script>
<script src="js/audio.js"></script>
<script src="js/world.js"></script>
<script src="js/princess.js"></script>
<script src="js/activities.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
