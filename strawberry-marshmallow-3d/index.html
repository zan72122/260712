<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>いちごましゅまろのおか</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffd9e6">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍓</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #ffd9e6;
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", "Yu Gothic", system-ui, sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    position: fixed;
  }
  #game {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
    touch-action: none;
  }

  /* ふんわりビネット */
  #vignette {
    position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(255,255,255,0) 62%,
      rgba(255,182,205,0.14) 88%,
      rgba(214,120,160,0.25) 100%);
    z-index: 2;
  }

  .hidden { display: none !important; }

  /* ---------- HUD ---------- */
  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 5;
    padding: max(10px, env(safe-area-inset-top))
             max(12px, env(safe-area-inset-right))
             max(10px, env(safe-area-inset-bottom))
             max(12px, env(safe-area-inset-left));
  }
  #basket-wrap {
    position: absolute;
    top: max(10px, env(safe-area-inset-top));
    left: max(12px, env(safe-area-inset-left));
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.72);
    border: 3px solid #ffb3c8;
    border-radius: 999px;
    padding: 6px 14px;
    box-shadow: 0 4px 14px rgba(214,120,160,0.35);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #basket { display: flex; gap: 2px; }
  #basket .slot {
    font-size: clamp(14px, 2.6vmin, 22px);
    filter: grayscale(1) opacity(0.28);
    transition: filter 0.2s, transform 0.2s;
  }
  #basket .slot.filled { filter: none; }
  #basket .slot.pop { animation: pop 0.45s ease; }
  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.7) rotate(-12deg); }
    100% { transform: scale(1); }
  }
  #total-count {
    font-size: clamp(14px, 2.8vmin, 20px);
    font-weight: bold;
    color: #d84a72;
    min-width: 2.5em;
  }

  .round-btn {
    pointer-events: auto;
    width: clamp(48px, 9vmin, 64px);
    height: clamp(48px, 9vmin, 64px);
    border-radius: 50%;
    border: 3px solid #ffb3c8;
    background: rgba(255,255,255,0.8);
    box-shadow: 0 4px 14px rgba(214,120,160,0.35);
    font-size: clamp(22px, 4.5vmin, 30px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.12s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .round-btn:active { transform: scale(0.88); }
  #buttons {
    position: absolute;
    top: max(10px, env(safe-area-inset-top));
    right: max(12px, env(safe-area-inset-right));
    display: flex; flex-direction: column; gap: 10px;
  }

  /* お祝いバナー */
  #banner {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    font-size: clamp(28px, 7vmin, 56px);
    font-weight: bold;
    color: #ff5d84;
    text-shadow:
      0 0 0 #fff,
      -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff,
      0 6px 18px rgba(214,120,160,0.5);
    opacity: 0;
    transition: opacity 0.4s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    pointer-events: none;
  }
  #banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* ---------- タイトル画面 ---------- */
  #title-screen {
    position: fixed; inset: 0;
    z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4vmin;
    background: linear-gradient(180deg,
      rgba(255,214,231,0.55) 0%,
      rgba(255,240,246,0.35) 45%,
      rgba(255,214,231,0.6) 100%);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  #title-card {
    background: rgba(255,255,255,0.85);
    border: 4px solid #ffb3c8;
    border-radius: 32px;
    padding: 5vmin 7vmin;
    text-align: center;
    box-shadow: 0 10px 40px rgba(214,120,160,0.45);
    animation: float 3s ease-in-out infinite;
    max-width: 86vw;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-1.2vmin); }
  }
  #title-berries { font-size: clamp(30px, 7vmin, 54px); letter-spacing: 0.2em; }
  h1 {
    font-size: clamp(26px, 6.5vmin, 52px);
    color: #ff5d84;
    margin: 1.5vmin 0 0.5vmin;
    letter-spacing: 0.08em;
  }
  #subtitle {
    font-size: clamp(13px, 3vmin, 20px);
    color: #b0708a;
    line-height: 1.7;
  }
  #start-btn {
    pointer-events: auto;
    border: none;
    font-family: inherit;
    font-size: clamp(22px, 5.5vmin, 38px);
    font-weight: bold;
    color: #fff;
    background: linear-gradient(180deg, #ff8fae 0%, #ff5d84 100%);
    border-radius: 999px;
    padding: 2.4vmin 9vmin;
    box-shadow: 0 8px 0 #d84a72, 0 14px 30px rgba(214,120,160,0.5);
    cursor: pointer;
    letter-spacing: 0.15em;
    animation: pulse 1.6s ease-in-out infinite;
  }
  #start-btn:active {
    transform: translateY(6px);
    box-shadow: 0 2px 0 #d84a72, 0 6px 16px rgba(214,120,160,0.5);
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  #howto {
    display: flex; gap: 5vmin;
    font-size: clamp(12px, 2.8vmin, 18px);
    color: #b0708a;
    text-align: center;
    line-height: 1.6;
  }
  #howto .step { background: rgba(255,255,255,0.75); border-radius: 20px; padding: 1.6vmin 3vmin; border: 2px solid #ffd0de; }
  #howto .big { font-size: clamp(24px, 5.5vmin, 40px); display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="vignette"></div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div id="basket-wrap">
    <div id="basket"></div>
    <div id="total-count">× 0</div>
  </div>
  <div id="buttons">
    <button class="round-btn" id="sound-btn" aria-label="おと">🔊</button>
    <button class="round-btn" id="time-btn" aria-label="ひる・よる">🌙</button>
  </div>
  <div id="banner" class="hidden"></div>
</div>

<!-- タイトル -->
<div id="title-screen">
  <div id="title-card">
    <div id="title-berries">🍓🐑🍓</div>
    <h1>いちごましゅまろのおか</h1>
    <div id="subtitle">ふわふわの おかで<br>いちごを あつめよう！</div>
  </div>
  <div id="howto">
    <div class="step"><span class="big">👆</span>タップで<br>あるくよ</div>
    <div class="step"><span class="big">🍓</span>いちごを<br>あつめてね</div>
    <div class="step"><span class="big">🐑</span>ひつじさんも<br>タップ！</div>
  </div>
  <button id="start-btn">あそぶ！</button>
</div>

<script src="vendor/three.min.js"></script>
<script src="src/utils.js"></script>
<script src="src/audio.js"></script>
<script src="src/sky.js"></script>
<script src="src/world.js"></script>
<script src="src/character.js"></script>
<script src="src/critters.js"></script>
<script src="src/effects.js"></script>
<script src="src/ui.js"></script>
<script src="src/main.js"></script>
</body>
</html>
